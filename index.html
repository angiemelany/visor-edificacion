<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Edificación</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f0f2f5; color: #333; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .controls { display: flex; gap: 20px; justify-content: center; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .control-group { display: flex; flex-direction: column; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 250px; margin-top: 5px; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Análisis de Permisos de Edificación</h1>
        <p>Segmentación interactiva de datos</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Filtrar por Destino:</label>
            <select id="filtroDestino" onchange="actualizarGrafico()">
                <option value="Todos">Todos los Destinos</option>
            </select>
        </div>
        <div class="control-group">
            <label>Filtrar por Comuna:</label>
            <select id="filtroComuna" onchange="actualizarGrafico()">
                <option value="Todas">Todas las Comunas</option>
            </select>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="miGrafico"></canvas>
    </div>

    <script>
        let datosGlobales = [];
        let miChart;

        // CARGA DE DATOS (Asegúrate de que el archivo se llame datos.csv)
        Papa.parse("data.csv", {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                datosGlobales = results.data;
                console.log("Datos cargados:", datosGlobales.length); // Para revisar en consola
                poblarFiltros(datosGlobales);
                inicializarGrafico();
            },
            error: function(err) {
                alert("Error al cargar el archivo datos.csv. Revisa el nombre en GitHub.");
            }
        });

        function poblarFiltros(data) {
            // Extraer valores únicos usando los nombres exactos de tus columnas
            const destinos = [...new Set(data.map(d => d.DESTINO))].filter(Boolean).sort();
            const comunas = [...new Set(data.map(d => d.Comuna))].filter(Boolean).sort();
            
            const selDestino = document.getElementById('filtroDestino');
            destinos.forEach(d => selDestino.add(new Option(d, d)));

            const selComuna = document.getElementById('filtroComuna');
            comunas.forEach(c => selComuna.add(new Option(c, c)));
        }

        function inicializarGrafico() {
            const ctx = document.getElementById('miGrafico').getContext('2d');
            miChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Superficie Total (m²)',
                        data: [],
                        backgroundColor: '#3498db',
                        borderColor: '#2980b9',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: true } },
                    scales: { y: { beginAtZero: true } }
                }
            });
            actualizarGrafico();
        }

        function actualizarGrafico() {
            const destinoSeleccionado = document.getElementById('filtroDestino').value;
            const comunaSeleccionada = document.getElementById('filtroComuna').value;

            // Aplicar filtros
            let filtrados = datosGlobales;
            if (destinoSeleccionado !== "Todos") {
                filtrados = filtrados.filter(d => d.DESTINO === destinoSeleccionado);
            }
            if (comunaSeleccionada !== "Todas") {
                filtrados = filtrados.filter(d => d.Comuna === comunaSeleccionada);
            }

            // Agrupar superficie por Año
            const resumen = {};
            filtrados.forEach(d => {
                const anio = d.Año || "Sin Fecha";
                resumen[anio] = (resumen[anio] || 0) + (parseFloat(d.superficie) || 0);
            });

            // Ordenar años cronológicamente
            const etiquetas = Object.keys(resumen).sort();
            const valores = etiquetas.map(label => resumen[label]);

            // Actualizar gráfico
            miChart.data.labels = etiquetas;
            miChart.data.datasets[0].data = valores;
            miChart.update();
        }
    </script>
</body>
</html>
